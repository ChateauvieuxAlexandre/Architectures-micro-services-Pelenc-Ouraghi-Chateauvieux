# Orchestration commune Voxenfer — groupe G1.
# Seule la gateway publie un port HTTP sur la machine.

x-jwt: &jwt-secret
  JWT_SECRET: "je-suis-le-secret-tres-secret-12"

x-python-healthcheck: &python-healthcheck
  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"]
  interval: 10s
  timeout: 3s
  retries: 5
  start_period: 5s

services:
  gateway:
    image: caddy:2
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  service-comptes:
    build: ./service-comptes
    environment:
      <<: *jwt-secret
      DB_PATH: /data/comptes.db
    volumes:
      - comptes-data:/data
    healthcheck: *python-healthcheck

  service-economie:
    build: ./service-economie
    environment:
      <<: *jwt-secret
      DB_PATH: /data/economie.db
    volumes:
      - economie-data:/data
    healthcheck: *python-healthcheck

  service-boutique:
    build: ./service-boutique
    environment:
      <<: *jwt-secret
      DB_PATH: /data/boutique.db
      ECONOMIE_URL: "http://service-economie:5000"
    volumes:
      - boutique-data:/data
    healthcheck: *python-healthcheck

  service-classements:
    build: ./service-classements
    environment:
      <<: *jwt-secret
      DB_PATH: /data/classements.db
    volumes:
      - classements-data:/data
    healthcheck: *python-healthcheck

  service-moderation:
    build: ./service-moderation
    environment:
      <<: *jwt-secret
      DB_PATH: /data/moderation.db
    volumes:
      - moderation-data:/data
    healthcheck: *python-healthcheck

  service-evenements:
    build: ./service-evenements
    environment:
      <<: *jwt-secret
      DB_PATH: /data/evenements.db
    volumes:
      - evenements-data:/data
    healthcheck: *python-healthcheck

  service-monde:
    build: ./service-monde
    environment:
      LUANTI_DSN: "host=luanti-db port=5432 dbname=luanti user=monde_reader password=monde_reader"
    depends_on:
      luanti-db:
        condition: service_healthy
    healthcheck: *python-healthcheck

  # PostgreSQL reproduit le schéma auth/player du moteur Luanti.
  luanti-db:
    image: postgres:16
    environment:
      POSTGRES_USER: luanti
      POSTGRES_PASSWORD: luanti
      POSTGRES_DB: luanti
    volumes:
      - ./luanti-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - luanti-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luanti -d luanti"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Serveur de jeu facultatif : docker compose --profile jeu up --build
  luanti:
    image: ghcr.io/luanti-org/luanti:master
    profiles: ["jeu"]
    user: "0:0"
    command: ["--config", "/etc/minetest/minetest.conf", "--world", "/var/lib/minetest/world", "--gameid", "minetest_game"]
    ports:
      - "30000:30000/udp"
    volumes:
      - ./luanti/minetest.conf:/etc/minetest/minetest.conf:ro
      - ./luanti/world.mt:/var/lib/minetest/world/world.mt
      - ./mod-voxenfer:/var/lib/minetest/world/worldmods/voxenfer:ro
      - ./minetest_game:/usr/local/share/luanti/games/minetest_game:ro
    depends_on:
      luanti-db:
        condition: service_healthy
      gateway:
        condition: service_started

volumes:
  comptes-data:
  economie-data:
  boutique-data:
  classements-data:
  moderation-data:
  evenements-data:
  luanti-data:
